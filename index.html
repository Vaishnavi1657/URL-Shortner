<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1>🔗 URL Shortener</h1>
                <div id="authButtons" class="auth-buttons">
                    <a href="login.html" class="btn-link">Login</a>
                    <a href="signup.html" class="btn-link btn-signup">Sign Up</a>
                </div>
                <div id="userProfile" class="user-profile" style="display: none;">
                    <span id="username">Welcome</span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </div>
            </div>
            <p>Make your links short and shareable</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <section class="shortener-section">
                <h2>Shorten Your URL</h2>
                
                <div class="form-group">
                    <label for="urlInput">Enter your long URL:</label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://example.com/very/long/url"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="customCode">Custom Code (optional):</label>
                    <input 
                        type="text" 
                        id="customCode" 
                        placeholder="e.g., my-link (3-20 alphanumeric characters)"
                        maxlength="20"
                    >
                    <small>Leave empty to auto-generate</small>
                </div>

                <button id="shortenBtn" class="btn-primary">Shorten URL</button>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </section>

            <!-- Result Section -->
            <section id="resultSection" class="result-section" style="display: none;">
                <h2>Your Shortened URL</h2>
                
                <div class="result-box">
                    <div class="result-item">
                        <label>Short URL:</label>
                        <div class="result-value">
                            <input 
                                type="text" 
                                id="shortUrlDisplay" 
                                readonly
                                class="result-input"
                            >
                            <button id="copyBtn" class="btn-copy">📋 Copy</button>
                        </div>
                    </div>

                    <div class="result-item">
                        <label>Original URL:</label>
                        <div class="result-value">
                            <input 
                                type="text" 
                                id="originalUrlDisplay" 
                                readonly
                                class="result-input"
                            >
                        </div>
                    </div>
                </div>

                <button id="newLinkBtn" class="btn-secondary">Shorten Another URL</button>
            </section>

            <!-- Recent URLs Section -->
            <section class="recent-urls-section">
                <h2>Your Recent URLs</h2>
                <button id="refreshBtn" class="btn-secondary">🔄 Refresh List</button>
                
                <div id="urlsList" class="urls-list">
                    <p class="loading">Loading...</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>© 2024 URL Shortener. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
